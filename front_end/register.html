<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav class="navbar bg-primary">
        <div class="container-fluid d-flex justify-content-center">
            <div>
                <span class="text-white">Attendance Management System</span>
            </div>
            <div>
    </nav>
    <div class="Register-Container">
    <h1>Registration Page</h1>
        <form action="">
            <span class="exampleFormControlInput1" id="name">UserName</span>
            <input type="text" class="form-control" placeholder="Username" aria-label="Username"
                aria-describedby="basic-addon1">
            <label for="exampleFormControlInput1" class="form-label">Email address</label>
            <input type="email" class="form-control" id="email" placeholder="name@example.com"><br>
            <label for="exampleFormControlInput1" class="form-label">Password</label>
            <input type="pass" class="form-control" id="pass" placeholder="name@example.com"><br>
            <label for="exampleFormControlInput1" class="form-label">ReEnter Password</label>
            <input type="pass" class="form-control" id="repass" placeholder="name@example.com">
            <p>Already have an account?<a href="/Frontend/login.html">Login</a></p>
            <button id="Reg-Button">Register</button>
        </form>
    </div>
    <script src="Register.js"></script>
</body>

</html>
